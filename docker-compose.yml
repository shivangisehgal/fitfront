services:
  postgres:
    image: postgres:15
    container_name: scheduler_ai_db
    environment:
      POSTGRES_USER: scheduler_user
      POSTGRES_PASSWORD: scheduler_pass
      POSTGRES_DB: scheduler_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler_user -d scheduler_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
